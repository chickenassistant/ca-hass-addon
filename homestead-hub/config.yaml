name: Homestead Hub
version: "0.2.0"
slug: homestead_hub
description: Local-first home automation hub for chicken keeping and garden management
url: https://github.com/homestead-assistant/hub
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false

# Web UI. Leave both entries so the addon can be accessed directly or via HA.
ports:
  "8080/tcp": 8080
ports_description:
  "8080/tcp": Web UI

ingress: true
ingress_port: 8080

panel_icon: mdi:home-automation
panel_title: Homestead

# Soft-require MQTT: install works without a broker (ZHA-only users). Z2M
# device discovery is disabled when no broker is available.
# Require an MQTT broker. When HA's Mosquitto add-on is installed, host and
# credentials are auto-discovered via Supervisor (see run.sh); the mqtt_*
# options below are only needed to override that discovery.
services:
  - mqtt:want

# Grants read access to HA state for ZHA/native entity ingestion.
homeassistant_api: true

# User-facing options. SESSION_SECRET is auto-generated on first run when
# blank. Leave admin_password blank to use the web UI first-run setup flow.
# Leave mqtt_* blank (host) / 0 (port) to use Supervisor discovery.
options:
  session_secret: ""
  admin_username: admin
  admin_password: ""
  mqtt_host: ""
  mqtt_port: 0
  mqtt_username: ""
  mqtt_password: ""
  # Module toggles. Disable a module to hide its nav and routes.
  ca_enabled: true
  ga_enabled: true
  # Weather (GA module). Set lat/lon for Open-Meteo, or set station_url for WeeWX.
  weather_source: open_meteo
  weather_lat: 0.0
  weather_lon: 0.0
  weather_station_url: ""
  # Home Assistant native ingestion (ZHA, etc.). Leave empty to skip.
  # Each entry maps an HA entity to a Homestead Hub sensor reading.
  ha_poll_interval: 30
  ha_entities: []

schema:
  session_secret: str
  admin_username: str
  admin_password: password
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  ca_enabled: bool
  ga_enabled: bool
  weather_source: str
  weather_lat: float
  weather_lon: float
  weather_station_url: str
  ha_poll_interval: int(5,3600)
  ha_entities:
    - entity_id: str
      device_id: str
      sensor_type: str
      unit: str?

# Pre-built image published by the build script / CI.
image: ghcr.io/homestead-assistant/hub-addon-{arch}
